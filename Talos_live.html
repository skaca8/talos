<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talos LIVE</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
--stone-0:#fff;--stone-50:#faf9f7;--stone-100:#f4f2ee;--stone-200:#e8e5df;
--stone-300:#d8d3ca;--stone-400:#b6afa3;--stone-500:#8c857a;--stone-600:#655f55;
--stone-700:#47423a;--stone-800:#2c2925;--stone-900:#1a1815;--stone-950:#110f0d;
--coral-50:#fff4ee;--coral-100:#ffe5d6;--coral-200:#ffc7a9;--coral-300:#ffa377;
--coral-400:#fb7c47;--coral-500:#f2602e;--coral-600:#db4a1c;--coral-700:#b53a16;--coral-800:#8e2f15;--coral-900:#722917;
--green-500:#2f9e69;--green-600:#258255;--amber-500:#e5a02b;--amber-600:#c5841a;
--red-50:#fdecec;--red-500:#d64545;--red-600:#b83636;--blue-500:#3b7fd6;
--bg:#faf9f7;--bg-subtle:#f4f2ee;--surface:#fff;--surface-2:#faf9f7;--overlay:rgba(26,24,21,.45);
--fg:#1a1815;--fg-2:#47423a;--fg-3:#8c857a;--fg-on-accent:#fff;
--border:#e8e5df;--border-strong:#d8d3ca;--border-focus:#f2602e;
--accent:#f2602e;--accent-hover:#db4a1c;--accent-press:#b53a16;--accent-subtle:#fff4ee;--accent-border:#ffc7a9;--accent-fg:#b53a16;
--success:#2f9e69;--warning:#e5a02b;--danger:#d64545;--danger-hover:#b83636;--info:#3b7fd6;--link:#db4a1c;
--font-sans:"Inter","Pretendard",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",Roboto,sans-serif;
--font-mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
--shadow-xs:0 1px 2px rgba(26,24,21,.05);
--shadow-sm:0 1px 3px rgba(26,24,21,.07),0 1px 2px rgba(26,24,21,.04);
--shadow-md:0 4px 10px rgba(26,24,21,.08),0 2px 4px rgba(26,24,21,.05);
--shadow-xl:0 24px 56px rgba(26,24,21,.14),0 8px 16px rgba(26,24,21,.06);
--ease:cubic-bezier(.22,1,.36,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font-sans);color:var(--fg);background:var(--stone-300);-webkit-font-smoothing:antialiased;word-break:keep-all;line-height:1.5;overflow:hidden}
.mono{font-family:var(--font-mono)}
.nw{white-space:nowrap}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
button:active{transform:scale(.985)}
svg{display:block}

#stage-root{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--stone-300);overflow:hidden}
#stage{width:1920px;height:1080px;background:var(--bg);display:flex;flex-direction:column;transform-origin:center center;flex-shrink:0;position:relative;overflow:hidden}

/* GLOBAL BAR */
.gbar{height:64px;flex-shrink:0;padding:0 32px;display:flex;align-items:center;gap:24px;border-bottom:1px solid var(--border);background:var(--surface)}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:30px;height:30px;border-radius:8px;background:var(--stone-900);display:flex;align-items:center;justify-content:center;color:#fff}
.logo-name{font-weight:700;font-size:18px;letter-spacing:-.01em}
.seg{display:flex;background:var(--stone-100);border-radius:9999px;padding:4px;gap:2px}
.seg button{padding:7px 14px;border-radius:9999px;font-size:13px;font-weight:500;color:var(--fg-2);display:flex;align-items:center;gap:6px;transition:all .15s var(--ease)}
.seg button.on{background:var(--surface);box-shadow:var(--shadow-xs);color:var(--accent-fg);font-weight:600}
.gbtn{padding:7px 14px;border:1px solid var(--border-strong);border-radius:8px;background:var(--surface);font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;transition:all .15s var(--ease)}
.gbtn:hover{background:var(--stone-50)}
.kbd{font-family:var(--font-mono);font-size:11px;padding:1px 6px;border:1px solid var(--border-strong);border-radius:5px;background:var(--stone-50);color:var(--fg-3)}
.spacer{flex:1}
.lang-wrap{position:relative}

.stage-body{flex:1;display:flex;min-height:0}

/* PHONE COL */
.phone-col{flex:0 0 470px;width:470px;background:var(--bg-subtle);border-right:1px solid var(--border);padding:24px 0;display:flex;flex-direction:column;align-items:center;transition:all .32s var(--ease);overflow:hidden}
.phone-col.hidden{flex:0 0 0;width:0;opacity:0;padding:0;border-right:none}
.phone-cap{font-size:13px;color:var(--fg-3);display:flex;align-items:center;gap:6px;background:var(--surface);padding:5px 14px;border-radius:9999px;border:1px solid var(--border);font-weight:500}
.phone{width:390px;height:844px;margin-top:40px;background:#000;border-radius:46px;padding:11px;flex-shrink:0;box-shadow:var(--shadow-xl)}
.phone-screen{width:100%;height:100%;border-radius:36px;overflow:hidden;background:var(--bg);display:flex;flex-direction:column;position:relative}
.island{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:112px;height:32px;background:#000;border-radius:20px;z-index:50}
.role-toggle{flex-shrink:0;padding:44px 16px 10px;display:flex;gap:10px;border-bottom:1px solid var(--border);align-items:center}
.role-seg{display:flex;gap:6px;background:var(--stone-100);border-radius:10px;padding:4px;flex:1}
.role-seg button{flex:1;padding:8px;border-radius:8px;font-size:13px;font-weight:600;color:var(--fg-3);display:flex;align-items:center;justify-content:center;gap:5px}
.role-seg button.on{background:var(--surface);box-shadow:var(--shadow-xs);color:var(--accent-fg)}
.role-note{font-size:10.5px;color:var(--fg-3);display:flex;align-items:center;gap:3px;white-space:nowrap}
.phone-body{flex:1;min-height:0;overflow-y:auto}

/* WORK screens */
.work{display:flex;flex-direction:column;height:100%}
.work-head{padding:18px 24px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.work-back{font-size:14px;color:var(--fg-3);display:flex;align-items:center;gap:4px;margin-bottom:10px}
.work-rno{font-size:34px;font-weight:700;letter-spacing:-.02em}
.work-type{display:inline-block;margin-top:8px;font-size:13px;font-weight:600;background:var(--stone-100);padding:5px 12px;border-radius:6px}
.work-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;gap:16px;min-height:0}
.work-foot{padding:20px;display:flex;flex-direction:column;gap:10px;flex-shrink:0}
.btn-big{width:100%;padding:18px;border-radius:14px;font-size:17px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:10px}
.btn-big.pri{background:var(--accent);color:#fff}
.btn-big.sec{background:var(--surface);color:var(--fg);border:1.5px solid var(--border-strong)}
.timer{font-family:var(--font-mono);font-size:64px;font-weight:700;letter-spacing:.02em}
.chip-cleaning{display:inline-flex;align-items:center;gap:6px;background:var(--accent-subtle);color:var(--accent-fg);font-size:13px;font-weight:600;padding:6px 14px;border-radius:9999px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-cleaning{background:var(--accent);animation:pulse 1.4s var(--ease) infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.done-check{width:96px;height:96px;border-radius:50%;background:var(--accent-subtle);display:flex;align-items:center;justify-content:center;color:var(--accent)}

/* HK list */
.hk-list{padding:18px 16px 20px}
.hk-greet{font-size:24px;font-weight:700;letter-spacing:-.01em}
.hk-sub{font-size:14px;color:var(--fg-3);margin-top:2px}
.hk-sub b{color:var(--fg);font-weight:700}
.hk-label{font-size:12px;color:var(--fg-3);font-weight:600;margin:18px 0 10px;text-transform:none}
.hk-card{border:1px solid var(--border);background:var(--surface);border-radius:14px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:14px}
.hk-card.active{border:1.5px solid var(--accent);box-shadow:0 0 0 3px var(--accent-subtle)}
.hk-num{width:30px;height:30px;border-radius:50%;background:var(--stone-100);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--fg-2);flex-shrink:0}
.hk-num.go{background:var(--accent);color:#fff}
.hk-info{flex:1;min-width:0}
.hk-rno{font-size:20px;font-weight:700;display:flex;align-items:center;gap:10px}
.hk-meta{font-size:13px;color:var(--fg-3);margin-top:3px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hk-timer{font-family:var(--font-mono);font-size:18px;font-weight:600;color:var(--accent)}
.tag-prog{font-size:13px;font-weight:700;color:var(--accent)}
.tag-soon{font-size:12px;font-weight:600;color:var(--amber-600);background:#fdf3e3;padding:3px 9px;border-radius:9999px;white-space:nowrap}
.tag-done{font-size:13px;color:var(--green-600);font-weight:600;display:flex;align-items:center;gap:4px}

/* RM */
.rm{padding:20px 16px}
.rm-title{font-size:24px;font-weight:700}
.rm-sub{font-size:14px;color:var(--fg-3);margin-top:2px}
.rm-sub b{color:var(--accent-fg)}
.rm-banner{margin:16px 0;background:var(--accent-subtle);border:1px solid var(--accent-border);border-radius:12px;padding:13px 14px;font-size:13.5px;font-weight:600;color:var(--accent-fg);display:flex;align-items:center;gap:9px}
.rm-card{border:1px solid var(--border);background:var(--surface);border-radius:14px;padding:16px;margin-bottom:12px;display:flex;align-items:center;gap:12px}
.rm-card.muted{opacity:.7}
.rm-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.rm-cinfo{flex:1;min-width:0}
.rm-crno{font-size:19px;font-weight:700;display:flex;align-items:center;gap:8px}
.rm-ctxt{font-size:14px;color:var(--fg-2);margin-top:3px}
.rm-cmeta{font-size:12px;color:var(--fg-3);margin-top:4px}
.badge-urgent{font-size:11px;font-weight:700;color:var(--red-600);background:var(--red-50);padding:2px 9px;border-radius:9999px}
.badge-done{font-size:11px;font-weight:600;color:var(--fg-3);background:var(--stone-100);padding:2px 9px;border-radius:9999px;display:inline-flex;align-items:center;gap:4px}
.rm-detail{padding:20px 16px}
.ai-box{border:1px solid var(--border);border-radius:14px;padding:16px;background:var(--surface-2);margin:14px 0}
.ai-head{font-size:13px;font-weight:700;color:var(--accent-fg);display:flex;align-items:center;gap:6px;margin-bottom:9px}
.ai-txt{font-size:15px;color:var(--fg-2);line-height:1.6}
.kv{display:flex;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border);font-size:14.5px}
.kv .k{color:var(--fg-3)}
.kv .v{font-weight:700;text-align:right}
.photo-ph{margin-top:14px;border:1px dashed var(--border-strong);border-radius:12px;padding:14px;text-align:center;font-size:13px;color:var(--fg-3)}

/* DASH */
.dash-col{flex:1;min-width:0;overflow:hidden;display:flex;flex-direction:column}
.dash{flex:1;display:flex;flex-direction:column;padding:28px 32px;gap:16px;min-height:0}
.kpi-strip{display:flex;gap:16px;flex-shrink:0}
.kpi{flex:1;border:1px solid var(--border);border-radius:12px;padding:20px 24px;background:var(--surface)}
.kpi-label{font-size:14px;color:var(--fg-3);white-space:nowrap}
.kpi-num{font-size:34px;font-weight:700;margin-top:6px;letter-spacing:-.02em}
.kpi.urgent .kpi-num{color:var(--red-600)}
.kpi.urgent{border-color:var(--accent-border)}
.kpi.hold .kpi-num{color:var(--stone-400)}

.dash-grid{flex:1;display:grid;grid-template-columns:1fr 440px;grid-template-rows:1fr auto;gap:20px;align-items:stretch;min-height:0}
.matrix-panel{grid-column:1;grid-row:1;display:flex;flex-direction:column;border:1px solid var(--border);border-radius:12px;background:var(--surface);min-height:0;overflow:hidden}
.panel-head{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.panel-title{font-size:16px;font-weight:700;white-space:nowrap}
.panel-cap{font-size:13px;color:var(--fg-3);white-space:nowrap}
.matrix-bar{display:flex;gap:14px;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0}
.legend{display:flex;gap:14px;align-items:center}
.leg{display:flex;align-items:center;gap:5px;font-size:12.5px;color:var(--fg-2);white-space:nowrap}
.floor-tabs{display:flex;gap:4px;margin-left:auto;background:var(--stone-100);border-radius:9999px;padding:3px}
.floor-tabs button{padding:6px 13px;border-radius:9999px;font-size:13px;font-weight:600;color:var(--fg-2);white-space:nowrap}
.floor-tabs button.on{background:var(--surface);box-shadow:var(--shadow-xs);color:var(--fg)}
.matrix-grid{flex:1;display:grid;grid-template-columns:repeat(6,1fr);grid-auto-rows:1fr;gap:12px;padding:18px 20px 20px}
.cell{border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;flex-direction:column;gap:4px;position:relative;background:var(--surface);transition:transform .12s var(--ease),box-shadow .12s var(--ease);cursor:pointer}
.cell:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.cell .cn{font-family:var(--font-mono);font-size:21px;font-weight:600}
.cell .cs{font-size:12.5px;font-weight:500}
.cell .cm{font-size:11.5px;color:var(--fg-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cell .cdot{position:absolute;top:14px;right:14px;width:10px;height:10px;border-radius:50%}
.cell.urgent{background:var(--red-50);border-color:#f1cccc}
.cell.urgent .cn{color:var(--red-600)}
.cell.hold{background:var(--stone-100);border-color:var(--stone-200)}
.cell.hold .cn{color:var(--stone-400)}
.cell .cicon{position:absolute;top:11px;right:11px;color:var(--red-500)}
.cell .cicon.gray{color:var(--stone-400)}

.rail{grid-column:2;grid-row:1;display:flex;flex-direction:column;gap:16px;min-height:0}
.panel{border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;min-height:0;background:var(--surface);overflow:hidden}
.panel.issues{flex:1.3}
.panel.feed{flex:1}
.panel-body{flex:1;overflow-y:auto;min-height:0}
.issue-row{display:flex;align-items:center;gap:10px;padding:13px 18px;border-bottom:1px solid var(--border);cursor:pointer}
.issue-row:hover{background:var(--stone-50)}
.ir-rno{font-family:var(--font-mono);font-size:15px;font-weight:600;width:42px;flex-shrink:0}
.ir-mid{flex:1;min-width:0}
.ir-txt{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ir-badges{display:flex;gap:6px;margin-top:5px}
.b-urg{font-size:11px;font-weight:700;color:var(--red-600);background:var(--red-50);padding:2px 8px;border-radius:9999px;white-space:nowrap}
.b-norm{font-size:11px;font-weight:600;color:var(--fg-2);background:var(--stone-100);padding:2px 8px;border-radius:9999px;white-space:nowrap}
.b-stat{font-size:11px;font-weight:500;color:var(--fg-3);white-space:nowrap;padding:2px 0}
.ir-arrow{color:var(--stone-400);flex-shrink:0}
.feed-cap{font-size:11px;color:var(--fg-3);background:var(--stone-100);padding:3px 9px;border-radius:9999px;margin-left:auto;white-space:nowrap}
.feed-row{display:flex;gap:11px;padding:13px 18px;position:relative}
.feed-mark{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.feed-mark .fd{width:9px;height:9px;border-radius:50%;margin-top:4px}
.feed-mark .fl{flex:1;width:2px;background:var(--border);margin:4px 0 -13px}
.feed-row:last-child .fl{display:none}
.feed-body{flex:1;min-width:0}
.feed-top{display:flex;align-items:center;gap:8px;font-size:14px}
.feed-top b{font-family:var(--font-mono);font-weight:600}
.feed-time{margin-left:auto;font-size:12px;color:var(--fg-3);font-family:var(--font-mono)}
.feed-txt{font-size:13px;color:var(--fg-2);margin-top:3px}
.feed-to{font-size:12px;color:var(--fg-3);margin-top:2px}
.chip-fs{font-size:11px;font-weight:600;padding:2px 8px;border-radius:9999px;white-space:nowrap}
.cf-confirm{color:var(--red-600);background:var(--red-50)}
.cf-doing{color:var(--amber-600);background:#fdf3e3}
.cf-done{color:var(--green-600);background:#e7f4ee}

.daily-panel{grid-column:1 / -1;grid-row:2;border:1px solid var(--border);border-radius:12px;background:var(--surface)}
.daily-head{display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:1px solid var(--border)}
.daily-total{margin-left:auto;font-size:14px;font-weight:600;white-space:nowrap}
.daily-cards{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;padding:16px}
.dcard{border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:box-shadow .12s var(--ease)}
.dcard:hover{box-shadow:var(--shadow-md)}
.dc-top{display:flex;align-items:center;gap:9px}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--stone-600);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0}
.dc-name{font-size:15px;font-weight:700;display:flex;align-items:center;gap:5px}
.dc-me{font-size:10px;color:var(--accent-fg);background:var(--accent-subtle);padding:1px 6px;border-radius:5px;font-weight:600}
.dc-zone{font-size:11.5px;color:var(--fg-3)}
.dc-stat{font-size:11px;font-weight:600;padding:3px 9px;border-radius:9999px;margin-left:auto;white-space:nowrap}
.ds-clean{color:var(--accent-fg);background:var(--accent-subtle)}
.ds-wait{color:var(--fg-3);background:var(--stone-100)}
.dc-row{display:flex;gap:14px;margin-top:14px}
.dc-met{display:flex;flex-direction:column}
.dc-met .mv{font-size:19px;font-weight:700;font-family:var(--font-mono)}
.dc-met .ml{font-size:11px;color:var(--fg-3);white-space:nowrap;margin-top:2px}
.dc-bar{height:5px;background:var(--stone-100);border-radius:9999px;margin-top:14px;overflow:hidden}
.dc-bar i{display:block;height:100%;background:var(--accent);border-radius:9999px}

/* SLIDE PANEL */
.panel-scrim{position:absolute;inset:0;z-index:80;background:rgba(26,24,21,.12);opacity:0;pointer-events:none;transition:opacity .32s var(--ease)}
.panel-scrim.on{opacity:1;pointer-events:auto}
.slide-panel{position:absolute;top:0;right:0;bottom:0;width:440px;z-index:81;background:var(--surface);border-left:1px solid var(--border);box-shadow:var(--shadow-xl);transform:translateX(100%);transition:transform .32s var(--ease);display:flex;flex-direction:column}
.slide-panel.on{transform:translateX(0)}
.sp-head{padding:20px 24px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:flex-start;gap:12px}
.sp-htext{flex:1;min-width:0}
.sp-eyebrow{font-size:12px;color:var(--fg-3);margin-bottom:6px}
.sp-title{font-size:24px;font-weight:700;display:flex;align-items:center;gap:10px}
.sp-title .mono{font-family:var(--font-mono)}
.sp-subtitle{font-size:13.5px;color:var(--fg-3);margin-top:6px}
.sp-close{width:34px;height:34px;border-radius:9999px;background:var(--stone-100);display:flex;align-items:center;justify-content:center;color:var(--fg-2);flex-shrink:0}
.sp-body{flex:1;overflow-y:auto;padding:20px 24px;min-height:0}
.sp-foot{padding:16px 24px;border-top:1px solid var(--border);flex-shrink:0;display:flex;gap:10px}
.sp-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:0 0 22px;border-bottom:1px solid var(--border);margin-bottom:20px}
.sp-kpi .v{font-size:24px;font-weight:700;font-family:var(--font-mono)}
.sp-kpi .l{font-size:11.5px;color:var(--fg-3);margin-top:3px;white-space:nowrap}
.sec-label{font-size:13px;font-weight:600;color:var(--fg-3);margin-bottom:14px}
/* staff timeline */
.tl-room{margin-bottom:16px}
.tl-room-top{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;margin-bottom:6px}

    p.done.forEach(r=>assign[r]={sid,k:'done'});
    if(p.cur)assign[p.cur]={sid,k:'cur'};
    p.todo.forEach(r=>assign[r]={sid,k:'todo'});}
  const startMap={1001:now-21*60000,815:now-18*60000,907:now-12*60000};
  for(const f of FLOORS)for(const n of roomsOf(f)){
    let status='ready',assignee=null,inProgress=false,startMs=null,checkin=null,doneMs=null;
    const type=planType(n),a=assign[n];
    if(n===1003){status='hold';assignee='hk-kim';}
    else if(n===820){status='hold';assignee='hk-park';}
    else if(a){assignee=a.sid;
      if(a.k==='done'){status='ready';doneMs=now-30*60000;}
      else if(a.k==='cur'){status='cleaning';inProgress=true;startMs=startMap[n]||now-15*60000;}
      else if(a.k==='todo'){status='dirty';}}
    if(n===1008){status='dirty';checkin='14:00';}
    rooms.push({id:n,floor:f,n,status,type,assignee,inProgress,startMs,checkin,doneMs});
  }
  return rooms;
}

function buildWorkLog(rooms){
  const wl={};
  for(const s of STAFF){
    const p=PLAN[s.id],list=[];
    if(p.cur){const r=rooms.find(x=>x.n===p.cur);list.push({room:p.cur,type:planType(p.cur),active:true,startMs:r?r.startMs:null});}
    p.done.forEach(rm=>list.push({room:rm,type:planType(rm),mins:MINS[s.id][rm],active:false}));
    wl[s.id]=list;
  }
  return wl;
}

function translateNode(root){
  if(S.lang!=='en'||!root)return;
  const w=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,null);
  const arr=[];let n;while(n=w.nextNode())arr.push(n);
  arr.forEach(t=>{const v=t.nodeValue;if(v&&/[가-힣]/.test(v)){const nv=i18n(v);if(nv!==v)t.nodeValue=nv;}});
}
const _i18nObserver=new MutationObserver(muts=>{
  if(S.lang!=='en')return;
  for(const m of muts)m.addedNodes.forEach(node=>{
    if(node.nodeType===3){const v=node.nodeValue;if(v&&/[가-힣]/.test(v)){const nv=i18n(v);if(nv!==v)node.nodeValue=nv;}}
    else if(node.nodeType===1)translateNode(node);
  });
});
function staffName(id){const s=STAFF.find(x=>x.id===id);return s?s.name:'';}
function kpiCounts(){
  let ready=0,cleaning=0,dirty=0,hold=0;
  for(const r of S.rooms){if(r.status==='ready')ready++;else if(r.status==='cleaning')cleaning++;else if(r.status==='dirty')dirty++;else if(r.status==='hold')hold++;}
  const urgent=S.issues.filter(i=>i.urgency==='urgent'&&(i.status==='open'||i.status==='review')).length;
  return{ready,cleaning,dirty,hold,urgent};
}
function staffStats(id){
  const wl=S.workLog[id]||[],seed=STAFF.find(s=>s.id===id).seedA;
  const done=wl.filter(w=>!w.active),inprog=wl.filter(w=>w.active);
  const doneN=done.length,assigned=Math.max(seed,doneN+inprog.length);
  const avg=doneN?Math.round(done.reduce((a,w)=>a+w.mins,0)/doneN):0;
  const within=done.filter(w=>w.mins<=TYPE[w.type].sla).length;
  const sla=doneN?Math.round(within/doneN*100):0;
  const issueN=S.issues.filter(i=>i.reporter===staffName(id)&&i.status!=='resolved').length;
  const cur=inprog.length?inprog[0].room:'—';
  return{doneN,assigned,avg,sla,issueN,cur,cleaning:inprog.length>0};
}
function issueOf(roomN){return S.issues.find(i=>i.room===Number(roomN)&&i.status!=='resolved');}
/* 단일 규칙: 준비완료 = 청소완료(doneMs) AND 미처리 이슈 없음. 청소했어도 이슈 남으면 판매보류 유지. */
function settleRoom(n){const r=room(n);if(!r)return;if(issueOf(n))r.status='hold';else if(r.doneMs)r.status='ready';else if(r.inProgress)r.status='cleaning';else r.status='dirty';}
/* effective toggle state for issue detail buttons; default open/review=active resolve, resolved=recheck */
function toggleState(iss){
  if(S.issueToggle[iss.id])return S.issueToggle[iss.id]; // user-set
  return iss.status==='resolved'?'resolved':'open'; // open => resolve active
}

function hkRooms(){
  // 배정 객실 집합은 시드(cur+todo+done)로 고정하되, 각 객실은 현재 state.rooms 상태로 동적 분류.
  // (정적 시드 위치로 그리면 청소 완료해도 todo에 남는 버그가 생김 — 수정내역 2차#3·3차#1)
  const p=PLAN['hk-kim'];const ids=[];
  const add=n=>{if(n&&ids.indexOf(n)<0)ids.push(n);};
  add(p.cur);p.todo.forEach(add);p.done.forEach(add);
  const prog=[],todo=[],done=[];
  ids.forEach(n=>{const r=room(n);if(!r)return;
    if(r.status==='cleaning')prog.push(n);

    else todo.push(n);});
  const list=[];
  prog.forEach(n=>list.push({n,k:'prog'}));
  todo.forEach(n=>list.push({n,k:'todo'}));
  done.forEach(n=>list.push({n,k:'done'}));

}

/* ============== STT MANAGER (§10-A) ============== */
const STT={rec:null,state:'idle',supported:false,manualStop:false};
(function detectSTT(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;STT.supported=!!SR;S.sttUnsupported=!SR;})();
function makeRec(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR)return null;
  const r=new SR();r.lang='ko-KR';r.continuous=true;r.interimResults=true;
  r.onstart=()=>{STT.state='listening';S.recState='listening';S.sttErr='';renderPhone();};
  r.onresult=(e)=>{let fin='',itm='';for(let i=e.resultIndex;i<e.results.length;i++){const res=e.results[i];if(res.isFinal)fin+=res[0].transcript;else itm+=res[0].transcript;}
    if(fin)S.transcript=(S.transcript+' '+fin).trim();S.interim=itm;updateTranscriptDOM();};
  r.onerror=(e)=>{
    console.error('STT onerror:',e.error);
    const msg={'not-allowed':'마이크 권한이 차단됨 — 주소창 자물쇠에서 허용해 주세요.','service-not-allowed':'음성 인식 서비스 권한이 차단되었습니다.','audio-capture':'마이크를 찾을 수 없습니다. 연결을 확인하세요.','network':'네트워크 오류로 음성 인식이 중단되었습니다.','no-speech':'음성이 감지되지 않았습니다. 다시 시도해 주세요.','aborted':'음성 인식이 중단되었습니다.','language-not-supported':'한국어 음성 인식이 지원되지 않는 환경입니다.'}[e.error]||('음성 인식 오류: '+e.error);
    if(e.error!=='no-speech'&&e.error!=='aborted'){S.sttErr=msg;}
    STT.state='idle';S.recState='idle';renderPhone();
  };
  r.onend=()=>{
    if(STT.state==='listening'&&!STT.manualStop){try{r.start();return;}catch(err){console.error('restart fail',err);}}
    STT.state='idle';S.recState='idle';renderPhone();
  };
  return r;
}
async function micToggle(){
  if(!STT.supported){S.sttUnsupported=true;renderPhone();return;}
  if(!window.isSecureContext){S.sttErr='HTTPS 또는 localhost에서만 음성 인식이 됩니다.';renderPhone();return;}
  if(STT.state==='listening'){ // stop
    STT.manualStop=true;STT.state='stopping';
    try{STT.rec&&STT.rec.stop();}catch(e){console.warn(e);}
    return;
  }
  if(STT.state!=='idle')return;
  STT.state='starting';
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    stream.getTracks().forEach(t=>t.stop());
  }catch(e){
    console.error('getUserMedia',e);
    S.sttErr='마이크 권한이 차단됨 — 주소창 자물쇠에서 허용해 주세요.';
    STT.state='idle';S.recState='idle';renderPhone();return;
  }
  STT.manualStop=false;
  try{STT.rec=makeRec();STT.rec.start();}
  catch(e){
    console.error('start fail',e);
    if(e.name==='InvalidStateError'){STT.rec=null;}
    S.sttErr='음성 인식을 시작하지 못했습니다. 다시 눌러 주세요.';
    STT.state='idle';S.recState='idle';renderPhone();
  }
}

/* ============== /report (§10·§12) ============== */
async function sendReport(){
  if(S.sending)return;
  if(!S.transcript.trim()&&!S.photos.length){toast('음성·사진·텍스트 중 하나를 입력하세요');return;}
  S.sending=true;updateTranscriptDOM();renderPhone();
  toast('에이전트 처리 중…','✓');
  const photo=S.photos[0]||null;
  const body={
    text:S.transcript.trim(),
    image_base64:photo?String(photo.url).split(',')[1]:null,
    image_media_type:photo?photo.media_type:null,
    board:S.rooms.map(r=>({id:r.id,status:r.status})),
    room_hint:S.hkRoom||1001,
    existing:S.issues.flatMap(i=>i.raws.map(rw=>rw.text)),
  };
  try{
    const res=await fetch('/report',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!res.ok){throw new Error('서버 응답 '+res.status);}
    const d=await res.json();
    applyResult(d,S.transcript.trim(),S.photos.slice());
    S.hkScreen='list';S.hkRoom=null;   // 전송 후 작업화면 → 하우스키핑 객실 목록 복귀
    closeSheet();
  }catch(err){
    console.error('/report 실패:',err);
    toast('오류: '+err.message);
  }finally{
    S.sending=false;renderPhone();
  }
}
function applyResult(d,rawText,photos){
  const r=room(d.room);if(!r){toast('오류: 객실을 찾을 수 없습니다');return;}
  if(/심각/.test(d.ai_read||''))d.urgency='urgent';   // AI 판독 위험도 '심각' → 긴급 배지 연동
  const existingIssue=issueOf(d.room);
  if(d.duplicate&&existingIssue){toast(d.room+'호 · 이미 접수된 내용입니다','•');return;}
  if(!d.review){r.status=d.room_status||(d.has_issue?'hold':'ready');}
  if(d.has_issue){
    let iss=existingIssue;
    if(iss){
      if(!iss.raws.some(x=>x.text===rawText))iss.raws.push({time:nowHM(),text:rawText});
      photos.forEach(p=>iss.photos.push({url:p.url,read:false,ai_read:d.ai_read}));
      if(d.urgency==='urgent')iss.urgency='urgent';
      if(!d.review){iss.summary=d.summary||iss.summary;iss.short=d.short||iss.short;}
    }else{
      iss={id:'is-'+d.room,room:Number(d.room),short:d.short||(rawText.slice(0,15)),summary:d.summary||rawText,raws:[{time:nowHM(),text:rawText}],photos:photos.map(p=>({url:p.url,read:false,ai_read:d.ai_read})),urgency:d.urgency||'normal',status:d.review?'review':'open',reporter:'Marcus',time:nowHM(),kind:d.kind||'시설'};
      S.issues=S.issues.filter(x=>x.room!==Number(d.room));S.issues.unshift(iss);
    }
    if(iss.urgency==='urgent'&&!d.review)S.feed.unshift({time:nowHM(),room:Number(d.room),status:'확인',text:iss.short});
  }else{ // cleaning complete
    r.status='ready';r.doneMs=Date.now();r.inProgress=false;
    const open=existingIssue;if(open)open.status='resolved';
    S.feed.unshift({time:nowHM(),room:Number(d.room),status:'조치완료',text:'청소 완료'});
  }
  S.matrixFloor=r.floor;
  toast(d.room+'호 · '+(d.message||'처리되었습니다'),d.has_issue?'⚠':'✓');
  if(d.message)speak(d.message);
  renderAll();
}
function nowHM(){const n=new Date();return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}

/* ============== ACTIONS ============== */
function openSlide(type,id){S.slide={type,id};renderSlide();}
function closeSlide(){S.slide=null;renderSlide();}
function closeSheet(){S.sheetOpen=false;if(STT.state==='listening'){STT.manualStop=true;try{STT.rec&&STT.rec.stop();}catch(e){}}S.interim='';renderPhone();}
function openSheet(){S.sheetOpen=true;S.sttErr='';renderPhone();}

const fileInput=document.createElement('input');
fileInput.type='file';fileInput.accept='image/*';fileInput.setAttribute('capture','environment');
fileInput.style.display='none';document.body.appendChild(fileInput);
fileInput.addEventListener('change',()=>{
  const f=fileInput.files&&fileInput.files[0];if(!f){return;}
  const reader=new FileReader();
  reader.onload=()=>{S.photos.push({url:reader.result,media_type:f.type||'image/jpeg'});fileInput.value='';renderPhone();};
  reader.onerror=()=>{console.error('파일 읽기 실패');toast('오류: 사진을 읽을 수 없습니다');};
  reader.readAsDataURL(f);
});

/* ============== EVENT DELEGATION (no inline onclick) ============== */
document.addEventListener('click',(e)=>{
  const el=e.target.closest('[data-act]');if(!el)return;
  const a=el.dataset.act;
  switch(a){
    case'view':S.view=el.dataset.view;if(S.view==='concept')S.conceptStep=0;renderAll();break;
    case'toggle-phone':S.showPhone=!S.showPhone;renderGbar();renderPhone();break;
    case'lang':S.lang=el.dataset.lang;if(!S.langCoachSeen)S.langCoachSeen=true;renderAll();renderCoach();if(S.lang==='en')translateNode(document.body);break;
    case'coach-ok':S.langCoachSeen=true;renderCoach();break;
    case'floor':S.matrixFloor=Number(el.dataset.floor);renderDash();break;
    case'cell':{const n=el.dataset.room,iss=issueOf(n);if(iss&&iss.urgency==='urgent')openSlide('issue',iss.id);else openSlide('room',n);break;}
    case'issue':openSlide('issue',el.dataset.id);break;
    case'staff':openSlide('staff',el.dataset.id);break;
    case'slide-close':closeSlide();break;
    case'issue-resolve':{const id=el.dataset.id;if(toggleState(S.issues.find(i=>i.id===id))==='open'){S.issueToggle[id]='resolved';const iss=S.issues.find(i=>i.id===id);iss.status='resolved';settleRoom(iss.room);const fi=S.feed.find(f=>f.room===iss.room);if(fi)fi.status='조치완료';renderSlide();renderDash();renderPhone();}break;}
    case'issue-recheck':{const id=el.dataset.id;if(toggleState(S.issues.find(i=>i.id===id))==='resolved'){S.issueToggle[id]='open';const iss=S.issues.find(i=>i.id===id);iss.status='open';settleRoom(iss.room);renderSlide();renderDash();renderPhone();}break;}
    case'role':S.phoneRole=el.dataset.role;renderPhone();break;
    case'hk-room':{const n=Number(el.dataset.room),r=room(n);
      if(r.status==='cleaning'){S.hkRoom=n;S.hkScreen='progress';renderPhone();}        // 진행중 → 완료 처리 진입
      else if(r.status==='dirty'){S.hkRoom=n;S.hkScreen='start';renderPhone();}          // 미청소만 청소 시작 허용
      else{toast(n+'호 · '+statusLabel(r.status));}                                        // 판매보류/준비완료 → 잠금(상태 안내)
      break;}
    case'hk-back':S.hkScreen='list';S.hkRoom=null;renderPhone();break;
    case'clean-start':{const r=room(S.hkRoom);r.status='cleaning';r.startMs=Date.now();r.inProgress=true;S.hkScreen='progress';renderPhone();renderDash();break;}
    case'clean-done':{const r=room(S.hkRoom);r.doneMs=Date.now();r.inProgress=false;settleRoom(S.hkRoom);S.hkScreen='done';
      const wl=S.workLog['hk-kim'];const ex=wl.find(w=>w.room===S.hkRoom);const mins=r.startMs?Math.max(1,Math.round((r.doneMs-r.startMs)/60000)):24;
      if(ex){ex.active=false;ex.mins=mins;}else wl.push({room:S.hkRoom,type:r.type,mins,active:false});
      S.feed.unshift({time:nowHM(),room:S.hkRoom,status:'조치완료',text:'청소 완료'});renderPhone();renderDash();break;}
    case'sheet-open':openSheet();break;
    case'sheet-close':closeSheet();break;
    case'mic':micToggle();break;
    case'photo':fileInput.click();break;
    case'type':{const v=prompt('보고 내용을 입력하세요 (입력 후 전송 버튼)');if(v&&v.trim()){S.transcript=(S.transcript+' '+v.trim()).trim();renderPhone();}break;}
    case'clear-photo':S.photos.splice(Number(el.dataset.idx),1);renderPhone();break;
    case'send':sendReport();break;
    case'rm-issue':S.rmIssue=el.dataset.id;S.rmScreen='detail';renderPhone();break;
    case'rm-back':S.rmScreen='inbox';S.rmIssue=null;renderPhone();break;
    case'rm-resolve':{const iss=S.issues.find(i=>i.id===el.dataset.id);iss.status='resolved';settleRoom(iss.room);const fi=S.feed.find(f=>f.room===iss.room);if(fi)fi.status='조치완료';S.rmScreen='inbox';renderPhone();renderDash();break;}
    case'lightbox':{const src=el.dataset.src,idx=Number(el.dataset.idx);const photos=src==='input'?S.photos:(S.issues.find(i=>i.id===el.dataset.id)||{}).photos||[];if(!photos.length)break;S.lightbox={src,id:el.dataset.id,idx};window.__lbFocus=el;renderLightbox();break;}
    case'lb-close':S.lightbox=null;renderLightbox();if(window.__lbFocus)try{window.__lbFocus.focus();}catch(e){}break;
    case'lb-prev':{const p=getLbPhotos();S.lightbox.idx=(S.lightbox.idx-1+p.length)%p.length;renderLightbox();break;}
    case'lb-next':{const p=getLbPhotos();S.lightbox.idx=(S.lightbox.idx+1)%p.length;renderLightbox();break;}
    case'concept-next':S.conceptStep=Math.min(S.conceptStep+1,CSTEPS.length-1);renderDash();break;
    case'concept-dot':S.conceptStep=Number(el.dataset.step);renderDash();break;
  }
});
/* scrim closes */
$('scrim').addEventListener('click',closeSlide);
document.addEventListener('click',(e)=>{
  if(e.target.id==='sheetScrim')closeSheet();
  if(e.target.id==='lightbox'){S.lightbox=null;renderLightbox();if(window.__lbFocus)try{window.__lbFocus.focus();}catch(e2){}}
});
/* keyboard */
document.addEventListener('keydown',(e)=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.key==='f'||e.key==='F'){S.showPhone=!S.showPhone;renderGbar();renderPhone();}
  if(e.key==='Escape'){if(S.lightbox){S.lightbox=null;renderLightbox();}else if(S.sheetOpen)closeSheet();else if(S.slide)closeSlide();}
  if(e.key==='Enter'){const f=document.activeElement;if(f&&f.dataset&&f.dataset.act==='lightbox')f.click();}
  if(S.view==='concept'&&(e.key==='ArrowRight'||e.key===' ')){S.conceptStep=Math.min(S.conceptStep+1,CSTEPS.length-1);renderDash();}
  if(S.view==='concept'&&e.key==='ArrowLeft'){S.conceptStep=Math.max(S.conceptStep-1,0);renderDash();}
});

/* ============== STAGE FIT ============== */
function fitStage(){const s=$('stage');if(!s)return;s.style.transform='scale('+Math.min(window.innerWidth/1920,window.innerHeight/1080)+')';}
window.addEventListener('resize',fitStage);

/* ============== TIMERS (1s) ============== */
setInterval(()=>{
  document.querySelectorAll('[data-timer]').forEach(el=>{
    const r=room(el.dataset.timer);if(r&&r.startMs)el.textContent=fmtTimer(r.startMs);
  });
},1000);

/* ============== INIT ============== */
function init(){
  fitStage();renderAll();
  _i18nObserver.observe(document.body,{childList:true,subtree:true});
  if(S.lang==='en')translateNode(document.body);
  if(window.location.protocol==='file:'||!window.isSecureContext){console.warn('비보안 컨텍스트: 음성 인식이 제한될 수 있습니다.');}
}
init();
</script>
